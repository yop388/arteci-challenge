version: '3.8'

services:
  minio:
    image: minio/minio:latest
    container_name: arteci-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadminpassword
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    restart: unless-stopped

  api:
    image: othnielparfait/arteci-api:latest
    container_name: arteci-api-prod
    ports:
      - "8000:8000"
    environment:
      - MINIO_URL=http://minio:9000
      - ACCESS_KEY=minioadmin
      - SECRET_KEY=minioadminpassword
      - PYTHONPATH=/app          
    depends_on:
      - minio
    restart: unless-stopped

volumes:
  minio_data: