                    networks:
                        ip: ::/0
                    password: ""
                    profile: default
                    quota: default
                    show_named_collection: 1
                    show_named_collection_secrets: 1
          functions.yaml: |
            functions:
              argument:
                  - name: buckets
                    type: Array(Float64)
                  - name: counts
                    type: Array(Float64)
                  - name: quantile
                    type: Array(Float64)
              command: ./histogramQuantile
